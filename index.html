<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart QR Code Generator</title>
  <meta name="description" content="Create beautiful, customized QR codes — free and fully browser-based." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ============ HEADER ============ -->
  <header class="site-header" id="top">
    <a href="#top" class="brand">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"></rect>
          <rect x="14" y="3" width="7" height="7" rx="1"></rect>
          <rect x="3" y="14" width="7" height="7" rx="1"></rect>
          <line x1="14" y1="14" x2="14" y2="14"></line>
          <line x1="14" y1="18" x2="14" y2="18"></line>
          <line x1="18" y1="14" x2="18" y2="14"></line>
          <line x1="21" y1="21" x2="21" y2="21"></line>
          <line x1="18" y1="21" x2="18" y2="21"></line>
          <line x1="21" y1="17" x2="21" y2="17"></line>
        </svg>
      </span>
      <span class="brand-text">Smart QR<span class="brand-accent">Code</span></span>
    </a>

    <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle dark mode" data-tip="Toggle dark / light mode">
      <svg class="icon-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><line x1="12" y1="2" x2="12" y2="4"></line><line x1="12" y1="20" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="6.34" y2="6.34"></line><line x1="17.66" y1="17.66" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="4" y2="12"></line><line x1="20" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="6.34" y2="17.66"></line><line x1="17.66" y1="6.34" x2="19.07" y2="4.93"></line></svg>
      <svg class="icon-moon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
    </button>
  </header>

  <!-- ============ APP ============ -->
  <main class="app">
    <div class="app-grid">
      <!-- ===== LEFT COLUMN ===== -->
      <section class="panel left-panel">
        <div class="panel-scroll">
          <!-- QR Type selector -->
          <div class="field-block">
            <label class="block-label">QR Type</label>
            <div class="type-tabs" id="typeTabs" role="tablist" aria-label="QR content type">
              <button class="type-tab active" type="button" data-type="url" role="tab" aria-selected="true">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                <span>URL</span>
              </button>
              <button class="type-tab" type="button" data-type="whatsapp" role="tab" aria-selected="false">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.149-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893A11.821 11.821 0 0 0 20.485 3.488"></path></svg>
                <span>WhatsApp</span>
              </button>
              <button class="type-tab" type="button" data-type="telegram" role="tab" aria-selected="false">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.5 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212-.07-.062-.174-.041-.249-.024-.106.024-1.793 1.139-5.061 3.345-.479.329-.913.489-1.302.481-.428-.009-1.252-.242-1.865-.44-.752-.244-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"></path></svg>
                <span>Telegram</span>
              </button>
              <button class="type-tab" type="button" data-type="wifi" role="tab" aria-selected="false">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg>
                <span>WiFi</span>
              </button>
            </div>
          </div>

          <!-- ===== URL panel ===== -->
          <div class="field-block type-panel" data-panel="url">
            <label class="block-label" for="url-link">Website URL</label>
            <label class="field">
              <input type="url" id="url-link" placeholder="https://example.com" autocomplete="off" autofocus />
            </label>
          </div>

          <!-- ===== WhatsApp panel ===== -->
          <div class="field-block type-panel" data-panel="whatsapp" hidden>
            <label class="block-label">WhatsApp Number</label>
            <div class="field-row">
              <label class="field" style="flex:0 0 96px">
                <span>Country code</span>
                <input type="tel" id="waCountry" placeholder="65" inputmode="numeric" autocomplete="off" />
              </label>
              <label class="field">
                <span>Phone number</span>
                <input type="tel" id="waPhone" placeholder="81234567" inputmode="numeric" autocomplete="off" />
              </label>
            </div>
            <label class="field" style="margin-top:14px">
              <span>Pre-filled message <em>(optional)</em></span>
              <textarea id="waMsg" placeholder="Hi! I'd like to know more…" rows="2"></textarea>
            </label>
          </div>

          <!-- ===== Telegram panel ===== -->
          <div class="field-block type-panel" data-panel="telegram" hidden>
            <label class="block-label">Telegram</label>
            <label class="field">
              <span>Username or phone</span>
              <input type="text" id="tgHandle" placeholder="@username  or  +6581234567" autocomplete="off" />
            </label>
            <p class="field-hint">Use a <strong>@username</strong> or a phone number with country code.</p>
          </div>

          <!-- ===== WiFi panel ===== -->
          <div class="field-block type-panel" data-panel="wifi" hidden>
            <label class="block-label">WiFi Network</label>
            <label class="field">
              <span>Network name (SSID)</span>
              <input type="text" id="wifiSsid" placeholder="MyNetwork" autocomplete="off" />
            </label>
            <label class="field" style="margin-top:14px">
              <span>Password</span>
              <span class="pw-wrap">
                <input type="password" id="wifiPass" placeholder="••••••••" autocomplete="off" />
                <button class="pw-toggle" id="wifiPassToggle" type="button" aria-label="Show password" data-tip="Show / hide">
                  <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </button>
              </span>
            </label>
            <div class="field-row" style="margin-top:14px">
              <label class="field">
                <span>Encryption</span>
                <select id="wifiEnc">
                  <option value="WPA">WPA / WPA2 / WPA3</option>
                  <option value="WEP">WEP</option>
                  <option value="nopass">None (open)</option>
                </select>
              </label>
            </div>
            <label class="checkbox-field" style="margin-top:14px">
              <input type="checkbox" id="wifiHidden" /> Hidden network
            </label>
          </div>

          <p class="field-error" id="fieldError" role="alert"></p>

          <!-- Color scheme -->
          <div class="field-block">
            <label class="block-label">Color Scheme</label>
            <div class="swatches" id="swatches" role="group" aria-label="Color presets">
              <button class="swatch active" type="button" data-fg="#111827" data-bg="#ffffff" style="--c:#111827" data-tip="Classic"></button>
              <button class="swatch" type="button" data-fg="#0d9488" data-bg="#ffffff" style="--c:#0d9488" data-tip="Teal"></button>
              <button class="swatch" type="button" data-fg="#2563eb" data-bg="#ffffff" style="--c:#2563eb" data-tip="Blue"></button>
              <button class="swatch" type="button" data-fg="#16a34a" data-bg="#ffffff" style="--c:#16a34a" data-tip="Green"></button>
              <button class="swatch" type="button" data-fg="#dc2626" data-bg="#ffffff" style="--c:#dc2626" data-tip="Red"></button>
              <button class="swatch" type="button" data-fg="#f8fafc" data-bg="#0f172a" style="--c:#0f172a" data-tip="Inverted"></button>
            </div>
            <div class="field-row">
              <label class="field color-field">
                <span>Foreground</span>
                <input type="color" id="fgColor" value="#111827" />
              </label>
              <label class="field color-field">
                <span>Background</span>
                <input type="color" id="bgColor" value="#ffffff" />
              </label>
            </div>
          </div>

          <!-- Logo -->
          <div class="field-block">
            <label class="block-label">Logo <em>(optional)</em></label>
            <div class="logo-upload">
              <label class="upload-drop" for="logoInput" id="logoDrop">
                <span class="upload-thumb" id="logoThumb">
                  <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                </span>
                <span class="upload-text">Click to upload<br /><em>PNG, JPG or SVG</em></span>
              </label>
              <input type="file" id="logoInput" accept="image/png,image/jpeg,image/svg+xml" hidden />
            </div>
            <label class="field" id="logoSizeField" hidden>
              <span>Logo Size: <strong id="logoSizeValue">40</strong>%</span>
              <input type="range" id="logoSize" min="10" max="50" step="2" value="40" />
            </label>
            <button class="btn btn-ghost btn-sm" id="removeLogo" type="button" hidden>Remove Logo</button>
          </div>

          <!-- Download row -->
          <div class="field-block download-block">
            <label class="block-label">Download &amp; Export</label>
            <div class="download-row">
              <button class="btn btn-primary" id="dlPng" type="button">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                PNG
              </button>
              <button class="btn btn-secondary" id="dlSvg" type="button">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                SVG
              </button>
              <button class="btn btn-ghost" id="copyBtn" type="button" data-tip="Copy image to clipboard">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                Copy
              </button>
              <button class="btn btn-ghost" id="resetBtn" type="button">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
                Reset
              </button>
            </div>
            <p class="toast" id="toast" role="status"></p>
          </div>
        </div>
      </section>

      <!-- ===== RIGHT COLUMN ===== -->
      <section class="panel right-panel">
        <div class="qr-stage" id="qrStage">
          <div class="qr-canvas" id="qrCanvas"></div>
          <div class="qr-placeholder" id="qrPlaceholder">
            <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="3" width="7" height="7" rx="1"></rect><rect x="3" y="14" width="7" height="7" rx="1"></rect></svg>
            <p>Enter a URL to generate your QR code</p>
          </div>
        </div>
        <div class="qr-info">
          <div class="qr-info-row"><span>Content</span><strong id="infoContent" class="truncate">—</strong></div>
        </div>
        <div class="scan-reminder">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"></polyline></svg>
          Test your QR code before printing
        </div>
      </section>
    </div>
  </main>

  <!-- ============ FOOTER ============ -->
  <footer class="site-footer">
    <p>Powered by
      <a href="https://www.tertiarycourses.com.sg/" target="_blank" rel="noopener noreferrer">Tertiary Infotech Academy Pte Ltd</a>
    </p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/qr-code-styling/lib/qr-code-styling.js"></script>
  <script src="app.js"></script>
</body>
</html>
